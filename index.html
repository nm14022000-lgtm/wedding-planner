<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>💍 Our Wedding Planner</title>
<meta name="description" content="A private, real-time wedding planning workspace for you and your partner.">
<meta name="theme-color" content="#3a1f5c">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="WedPlan">
<meta name="mobile-web-app-capable" content="yes">
<link rel="manifest" href="manifest.json">
<link rel="icon" href="favicon.png" type="image/png">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --rose: #c0627a;
    --rose-light: #f7e8ed;
    --rose-mid: #e8b4c0;
    --plum: #3a1f5c;
    --plum-mid: #7a4fa8;
    --plum-light: #f0e8fa;
    --gold: #c9a84c;
    --gold-light: #fdf6e3;
    --cream: #fdfaf6;
    --white: #ffffff;
    --gray: #8a7a8a;
    --border: #e8dff0;
    --shadow: 0 4px 20px rgba(60, 30, 90, 0.05);
    --transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html { height: 100%; }
  body { 
    font-family: 'Lato', sans-serif; 
    background: var(--cream); 
    color: var(--plum); 
    min-height: 100vh;
    min-height: 100dvh;
    background-image: 
      radial-gradient(at 0% 0%, #f7e8ed 0px, transparent 50%),
      radial-gradient(at 100% 100%, #f0e8fa 0px, transparent 50%);
    background-attachment: fixed;
    padding-left: env(safe-area-inset-left);
    padding-right: env(safe-area-inset-right);
    padding-bottom: env(safe-area-inset-bottom);
  }

  /* NAV */
  #nav {
    background: rgba(255, 255, 255, 0.85);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--border);
    position: sticky; top: 0; z-index: 200;
    box-shadow: 0 2px 12px rgba(60,30,90,0.06);
    padding-top: env(safe-area-inset-top);
  }
  .nav-top {
    display: flex; align-items: center; justify-content: space-between;
    padding: 14px 24px;
  }
  .nav-brand {
    font-family: 'Playfair Display', serif;
    font-size: 22px; color: var(--plum); cursor: pointer;
    display: flex; align-items: center; gap: 8px;
    font-weight: 700;
    letter-spacing: 0.5px;
  }
  .nav-tabs {
    display: flex; overflow-x: auto; padding: 0 24px;
    gap: 8px; border-top: 1px solid var(--border);
    scrollbar-width: none;
  }
  .nav-tabs::-webkit-scrollbar { display: none; }
  .nav-tab {
    padding: 12px 18px; font-size: 13.5px; cursor: pointer;
    border: none; background: none; color: var(--gray);
    border-bottom: 3px solid transparent; white-space: nowrap;
    font-family: 'Lato', sans-serif; transition: var(--transition);
    font-weight: 500;
  }
  .nav-tab:hover { color: var(--plum-mid); }
  .nav-tab.active { color: var(--rose); border-bottom-color: var(--rose); font-weight: 700; }

  /* PAGES */
  .page { display: none; padding: 32px 24px; max-width: 1000px; margin: 0 auto; }
  .page.active { display: block; animation: fadeIn 0.4s cubic-bezier(0.25, 0.8, 0.25, 1); }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }

  /* HOME */
  .home-hero {
    background: linear-gradient(135deg, #f7e8ed 0%, #f0e8fa 50%, #fdf6e3 100%);
    border-radius: 28px; padding: 56px 32px; text-align: center;
    margin-bottom: 36px; position: relative; overflow: hidden;
    box-shadow: var(--shadow);
    border: 1px solid rgba(255, 255, 255, 0.6);
  }
  .home-hero::before {
    content: ''; position: absolute; inset: 0;
    background: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23c0627a' fill-opacity='0.04'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
  }
  .home-hero h1 { font-family: 'Playfair Display', serif; font-size: 46px; color: var(--plum); margin-bottom: 12px; position: relative; font-weight: 700; }
  .home-hero p { font-size: 17px; color: var(--gray); position: relative; font-weight: 300; }
  .budget-pill {
    display: inline-block; background: var(--white); border-radius: 30px;
    padding: 10px 26px; margin-top: 24px; border: 1px solid var(--border);
    font-weight: 700; color: var(--plum-mid); font-size: 15px; position: relative;
    box-shadow: 0 4px 15px rgba(60,30,90,0.04);
  }
  .home-grid {
    display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 20px;
  }
  .home-card {
    background: var(--white); border: 1px solid var(--border); border-radius: 20px;
    padding: 24px 20px; cursor: pointer; transition: var(--transition); text-align: left;
    box-shadow: 0 2px 8px rgba(60,30,90,0.02);
  }
  .home-card:hover { transform: translateY(-4px); box-shadow: 0 12px 30px rgba(60,30,90,0.08); border-color: var(--rose-mid); }
  .home-card .icon { font-size: 36px; margin-bottom: 12px; }
  .home-card .title { font-family: 'Playfair Display', serif; font-size: 16px; color: var(--plum); font-weight: 700; }
  .home-card .count { font-size: 13px; color: var(--gray); margin-top: 6px; }

  /* PAGE HEADER */
  .page-header {
    border-radius: 22px; padding: 26px 30px; margin-bottom: 28px;
    display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 16px;
    box-shadow: var(--shadow);
  }
  .page-header h2 { font-family: 'Playfair Display', serif; font-size: 30px; color: var(--plum); font-weight: 700; }
  .page-header .meta { font-size: 13.5px; color: var(--gray); margin-top: 4px; }
  .btn-group { display: flex; gap: 12px; flex-wrap: wrap; }

  /* BUTTONS */
  .btn-primary {
    background: linear-gradient(135deg, var(--rose), #a84a62);
    color: var(--white); border: none; border-radius: 12px;
    padding: 11px 22px; cursor: pointer; font-size: 14.5px; font-weight: 700;
    font-family: 'Lato', sans-serif; transition: var(--transition);
    box-shadow: 0 4px 15px rgba(192, 98, 122, 0.25);
  }
  .btn-primary:hover { opacity: 0.95; transform: translateY(-1px); box-shadow: 0 6px 20px rgba(192, 98, 122, 0.35); }
  .btn-secondary {
    background: var(--plum-light); color: var(--plum-mid); border: 1px solid var(--border);
    border-radius: 12px; padding: 11px 20px; cursor: pointer; font-size: 14px;
    font-family: 'Lato', sans-serif; font-weight: 700; transition: var(--transition);
  }
  .btn-secondary:hover { background: var(--rose-light); color: var(--rose); transform: translateY(-1px); }
  .btn-cancel {
    background: #f5f0f8; color: var(--gray); border: 1px solid var(--border);
    border-radius: 12px; padding: 11px 18px; cursor: pointer; font-size: 14px;
    font-family: 'Lato', sans-serif; transition: var(--transition);
  }
  .btn-cancel:hover { background: #ebdff5; }
  .btn-icon {
    border: none; border-radius: 10px; padding: 8px 12px; cursor: pointer; font-size: 14px;
    transition: var(--transition);
  }
  .btn-icon:hover { transform: scale(1.05); }
  .btn-edit { background: var(--plum-light); color: var(--plum-mid); }
  .btn-edit:hover { background: var(--plum-mid); color: var(--white); }
  .btn-delete { background: #fde8e8; color: #c0392b; }
  .btn-delete:hover { background: #c0392b; color: var(--white); }

  /* FORM */
  .form-box {
    background: #faf7fd; border: 1.5px solid #d4b8f0; border-radius: 20px;
    padding: 24px; margin-bottom: 24px;
    box-shadow: 0 8px 30px rgba(60,30,90,0.04);
  }
  .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 16px; }
  .form-full { grid-column: 1 / -1; }
  label { display: block; font-size: 13.5px; color: var(--plum-mid); font-weight: 700; margin-bottom: 6px; }
  input[type=text], input[type=number], input[type=url], textarea, select {
    width: 100%; padding: 11px 15px; border: 1px solid var(--border); border-radius: 12px;
    font-size: 14.5px; background: var(--white); color: var(--plum);
    font-family: 'Lato', sans-serif; outline: none; transition: var(--transition);
  }
  input:focus, textarea:focus, select:focus { border-color: var(--plum-mid); box-shadow: 0 0 0 3px rgba(122, 79, 168, 0.15); }
  textarea { resize: vertical; }
  .checkbox-row { display: flex; align-items: center; gap: 10px; margin-bottom: 18px; }
  .checkbox-row input { width: 18px; height: 18px; cursor: pointer; }
  .checkbox-row label { margin: 0; font-size: 14.5px; color: var(--plum); cursor: pointer; font-weight: 500; }

  /* ENTRY CARD */
  .entry-card {
    background: var(--white); border: 1px solid var(--border); border-radius: 18px;
    padding: 20px; margin-bottom: 14px;
    display: flex; gap: 18px; align-items: flex-start;
    transition: var(--transition);
    box-shadow: 0 2px 6px rgba(60,30,90,0.01);
  }
  .entry-card:hover { box-shadow: 0 8px 24px rgba(60,30,90,0.06); transform: translateY(-2px); }
  .entry-thumb { width: 80px; height: 80px; border-radius: 14px; object-fit: cover; flex-shrink: 0; }
  .entry-thumb-placeholder {
    width: 80px; height: 80px; border-radius: 14px; background: var(--plum-light);
    display: flex; align-items: center; justify-content: center; font-size: 28px; flex-shrink: 0;
  }
  .entry-body { flex: 1; min-width: 0; }
  .entry-name { font-family: 'Playfair Display', serif; font-size: 18.5px; color: var(--plum); font-weight: 700; }
  .entry-badges { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 8px; }
  .badge { font-size: 12.5px; font-weight: 700; padding: 4px 12px; border-radius: 20px; }
  .badge-cost { background: #e8f5e8; color: #2a6e3a; }
  .badge-selected { background: var(--rose-light); color: var(--rose); }
  .entry-notes { font-size: 14px; color: var(--gray); margin-top: 6px; line-height: 1.4; }
  .entry-link { font-size: 13.5px; color: var(--plum-mid); margin-top: 6px; display: inline-block; word-break: break-all; text-decoration: none; }
  .entry-link:hover { text-decoration: underline; }
  .entry-actions { display: flex; gap: 8px; flex-shrink: 0; }

  /* COMPARE */
  .compare-box {
    background: #faf7fd; border: 1px solid var(--border); border-radius: 20px;
    padding: 24px; margin-bottom: 24px;
    box-shadow: 0 4px 15px rgba(60,30,90,0.02);
  }
  .compare-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 18px; }
  .compare-header h3 { font-family: 'Playfair Display', serif; font-size: 22px; color: var(--plum); font-weight: 700; }
  table { width: 100%; border-collapse: collapse; font-size: 14.5px; }
  th { padding: 12px 14px; text-align: left; background: var(--plum-light); color: var(--plum); font-weight: 700; font-size: 13.5px; }
  td { padding: 12px 14px; border-bottom: 1px solid var(--border); vertical-align: middle; }
  tr.selected-row { background: #f0faf0; }
  tr:last-child td { border-bottom: none; }
  .compare-summary {
    margin-top: 18px; padding: 14px 18px; background: var(--plum-light);
    border-radius: 14px; font-size: 14.5px; color: var(--plum);
  }

  /* BUDGET */
  .budget-stats { display: grid; grid-template-columns: repeat(3,1fr); gap: 16px; margin-top: 18px; margin-bottom: 24px; }
  .stat-card { background: var(--white); border-radius: 16px; padding: 20px; border: 1px solid var(--border); box-shadow: var(--shadow); }
  .stat-label { font-size: 13px; color: var(--gray); margin-bottom: 8px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; }
  .stat-value { font-size: 26px; font-weight: 700; }
  .progress-wrap { margin-bottom: 24px; }
  .progress-labels { display: flex; justify-content: space-between; font-size: 13px; color: var(--gray); margin-bottom: 8px; }
  .progress-bar { height: 12px; background: var(--plum-light); border-radius: 10px; overflow: hidden; }
  .progress-fill { height: 100%; border-radius: 10px; transition: width 0.6s ease-in-out; background: var(--rose); }
  .budget-item {
    background: var(--white); border: 1px solid var(--border); border-radius: 18px;
    padding: 16px 20px; margin-bottom: 12px;
    display: flex; align-items: center; gap: 16px; flex-wrap: wrap;
    transition: var(--transition);
  }
  .budget-item:hover { box-shadow: 0 4px 12px rgba(60,30,90,0.03); }
  .budget-item.over { border-color: #f5c6c6; background: #fffdfd; }
  .budget-cat { font-weight: 700; color: var(--plum); flex: 1; min-width: 120px; font-family: 'Playfair Display', serif; font-size: 17px; }
  .budget-note { font-size: 13.5px; color: var(--gray); margin-top: 2px; }
  .budget-num { font-size: 14.5px; }

  /* MOODBOARD */
  .mood-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 18px; }
  .mood-item { border-radius: 20px; overflow: hidden; border: 1px solid var(--border); position: relative; background: var(--white); transition: var(--transition); box-shadow: var(--shadow); }
  .mood-item:hover { transform: translateY(-4px); box-shadow: 0 10px 25px rgba(60,30,90,0.08); }
  .mood-item img { width: 100%; height: 200px; object-fit: cover; display: block; }
  .mood-label { padding: 12px; }
  .mood-label input { border: none; background: none; width: 100%; font-size: 13.5px; color: var(--plum); font-weight: 700; font-family: 'Lato', sans-serif; outline: none; }
  .mood-label input:focus { border-bottom: 1px solid var(--plum-mid); }
  .mood-del { position: absolute; top: 10px; right: 10px; background: rgba(255,255,255,0.92); border: none; border-radius: 10px; padding: 6px 10px; cursor: pointer; font-size: 13.5px; transition: var(--transition); }
  .mood-del:hover { background: #fde8e8; color: #c0392b; }

  /* AUTH SCREEN */
  #authScreen {
    min-height: 100vh; min-height: 100dvh; display: flex; align-items: center; justify-content: center;
    padding: 24px;
    padding-top: calc(24px + env(safe-area-inset-top));
  }
  .auth-card {
    background: var(--white); border-radius: 28px; padding: 44px 36px;
    max-width: 420px; width: 100%; box-shadow: 0 20px 60px rgba(60,30,90,0.12);
    border: 1px solid rgba(255,255,255,0.6); text-align: center;
  }
  .auth-card .logo { font-size: 44px; margin-bottom: 6px; }
  .auth-card h1 { font-family: 'Playfair Display', serif; font-size: 26px; color: var(--plum); margin-bottom: 6px; font-weight: 700; }
  .auth-card .sub { font-size: 14px; color: var(--gray); margin-bottom: 26px; font-weight: 300; }
  .auth-card .field { text-align: left; margin-bottom: 14px; }
  .auth-card .field label { font-size: 13px; margin-bottom: 5px; }
  .auth-tabs { display: flex; background: var(--plum-light); border-radius: 12px; padding: 4px; margin-bottom: 22px; }
  .auth-tab { flex: 1; border: none; background: none; padding: 9px; border-radius: 9px; cursor: pointer; font-family: 'Lato', sans-serif; font-weight: 700; font-size: 13.5px; color: var(--plum-mid); transition: var(--transition); }
  .auth-tab.active { background: var(--white); color: var(--rose); box-shadow: 0 2px 8px rgba(60,30,90,0.08); }
  .auth-error { background: #fde8e8; color: #c0392b; border-radius: 10px; padding: 10px 14px; font-size: 13px; margin-bottom: 14px; text-align: left; display: none; }
  .btn-block { width: 100%; text-align: center; display: block; margin-top: 4px; }
  .btn-google {
    width: 100%; background: var(--white); color: var(--plum); border: 1.5px solid var(--border);
    border-radius: 12px; padding: 11px 20px; cursor: pointer; font-size: 14px; font-weight: 700;
    font-family: 'Lato', sans-serif; transition: var(--transition);
    display: flex; align-items: center; justify-content: center; gap: 10px;
  }
  .btn-google:hover { background: var(--rose-light); border-color: var(--rose-mid); }
  .auth-divider { display: flex; align-items: center; gap: 12px; margin: 18px 0; color: var(--gray); font-size: 12.5px; }
  .auth-divider::before, .auth-divider::after { content: ''; flex: 1; height: 1px; background: var(--border); }
  .onboard-choice { display: grid; gap: 14px; margin-top: 6px; }
  .onboard-option {
    background: var(--white); border: 1.5px solid var(--border); border-radius: 16px;
    padding: 18px; cursor: pointer; text-align: left; transition: var(--transition);
  }
  .onboard-option:hover { border-color: var(--rose-mid); transform: translateY(-2px); box-shadow: 0 8px 20px rgba(60,30,90,0.06); }
  .onboard-option .oi { font-size: 22px; margin-bottom: 6px; }
  .onboard-option .ot { font-family: 'Playfair Display', serif; font-weight: 700; color: var(--plum); font-size: 15.5px; }
  .onboard-option .od { font-size: 13px; color: var(--gray); margin-top: 3px; }
  .invite-box {
    background: var(--gold-light); border: 1px dashed #c9a84c; border-radius: 14px;
    padding: 16px; margin-top: 16px; text-align: center;
  }
  .invite-code { font-family: 'Playfair Display', serif; font-size: 26px; letter-spacing: 4px; color: var(--plum); font-weight: 700; margin: 6px 0; }

  /* ACCOUNT / SETTINGS PANEL */
  .account-btn {
    width: 36px; height: 36px; border-radius: 50%; border: none; cursor: pointer;
    background: linear-gradient(135deg, var(--rose), var(--plum-mid)); color: var(--white);
    font-weight: 700; font-size: 14px; display: flex; align-items: center; justify-content: center;
    font-family: 'Lato', sans-serif;
  }
  .account-panel {
    position: fixed; top: 0; right: 0; height: 100vh; height: 100dvh; width: min(360px, 92vw);
    background: var(--white); z-index: 500; box-shadow: -12px 0 40px rgba(60,30,90,0.15);
    padding: 28px 24px; transform: translateX(100%); transition: transform 0.3s cubic-bezier(0.25,0.8,0.25,1);
    overflow-y: auto;
    padding-top: calc(28px + env(safe-area-inset-top));
    padding-bottom: calc(28px + env(safe-area-inset-bottom));
    padding-right: calc(24px + env(safe-area-inset-right));
  }
  .account-panel.open { transform: translateX(0); }
  .account-scrim { position: fixed; inset: 0; background: rgba(30,15,45,0.35); z-index: 490; display: none; }
  .account-scrim.open { display: block; }
  .account-panel h3 { font-family: 'Playfair Display', serif; color: var(--plum); font-size: 20px; margin-bottom: 18px; }
  .account-row { padding: 12px 0; border-bottom: 1px solid var(--border); font-size: 14px; color: var(--plum); }
  .account-row .lbl { font-size: 12px; color: var(--gray); text-transform: uppercase; letter-spacing: 0.5px; font-weight: 700; margin-bottom: 4px; }

  /* GUEST LIST */
  .guest-table-wrap { overflow-x: auto; background: var(--white); border-radius: 18px; border: 1px solid var(--border); box-shadow: var(--shadow); }
  .rsvp-pill { font-size: 12px; font-weight: 700; padding: 4px 12px; border-radius: 20px; display: inline-block; }
  .rsvp-yes { background: #e8f5e8; color: #2a6e3a; }
  .rsvp-no { background: #fde8e8; color: #c0392b; }
  .rsvp-pending { background: #fdf6e3; color: #a87c0f; }
  .side-pill { font-size: 12px; font-weight: 700; padding: 3px 10px; border-radius: 20px; }
  .side-bride { background: var(--rose-light); color: var(--rose); }
  .side-groom { background: var(--plum-light); color: var(--plum-mid); }
  .side-both { background: var(--gold-light); color: #a87c0f; }
  select.rsvp-select { padding: 6px 10px; font-size: 12.5px; border-radius: 8px; }

  /* TIMELINE / CHECKLIST */
  .timeline-item {
    background: var(--white); border: 1px solid var(--border); border-radius: 16px;
    padding: 16px 20px; margin-bottom: 10px; display: flex; align-items: flex-start; gap: 14px;
    transition: var(--transition);
  }
  .timeline-item.done { opacity: 0.55; }
  .timeline-item.overdue { border-color: #f0b8b8; background: #fffaf9; }
  .timeline-check { width: 22px; height: 22px; border-radius: 50%; cursor: pointer; flex-shrink: 0; margin-top: 2px; }
  .timeline-body { flex: 1; }
  .timeline-task { font-family: 'Playfair Display', serif; font-weight: 700; color: var(--plum); font-size: 16px; }
  .timeline-item.done .timeline-task { text-decoration: line-through; }
  .timeline-meta { font-size: 12.5px; color: var(--gray); margin-top: 4px; display: flex; gap: 10px; flex-wrap: wrap; align-items: center; }
  .timeline-due { font-weight: 700; }
  .timeline-due.overdue-text { color: #c0392b; }
  .timeline-cat-badge { background: var(--plum-light); color: var(--plum-mid); padding: 2px 10px; border-radius: 20px; font-weight: 700; font-size: 11.5px; }

  /* FUNCTION PILLS */
  .function-pills { display: flex; gap: 8px; flex-wrap: wrap; margin: 18px 0; }
  .function-pill {
    border: 1.5px solid var(--border); background: var(--white); color: var(--plum-mid);
    padding: 7px 16px; border-radius: 20px; font-size: 13px; font-weight: 700; cursor: pointer;

  }
  .function-pill .cnt { background: var(--plum-light); border-radius: 10px; padding: 1px 7px; font-size: 11px; }
  .function-pill.active { background: var(--rose); border-color: var(--rose); color: var(--white); }
  .function-pill.active .cnt { background: rgba(255,255,255,0.25); color: var(--white); }
  .function-pill:hover { border-color: var(--rose-mid); }

  /* KANBAN BOARD */

    background: var(--white); border: 1px solid var(--border); border-radius: 12px;
    padding: 12px 14px; margin-bottom: 10px; box-shadow: var(--shadow); transition: var(--transition);
  }
  .kanban-card:hover { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(60,30,90,0.08); }
  .kanban-card .kc-title { font-family: 'Playfair Display', serif; font-weight: 700; color: var(--plum); font-size: 14.5px; margin-bottom: 6px; }
  .kanban-card .kc-meta { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; font-size: 11.5px; color: var(--gray); margin-bottom: 8px; }
  .kanban-card .kc-due { font-weight: 700; }
  .kanban-card .kc-due.overdue-text { color: #c0392b; }
  .kanban-card .kc-func-badge { background: var(--plum-light); color: var(--plum-mid); padding: 2px 9px; border-radius: 20px; font-weight: 700; }
  .kc-priority { padding: 2px 9px; border-radius: 20px; font-weight: 700; font-size: 11px; }
  .kc-priority.High { background: #fde8e8; color: #c0392b; }
  .kc-priority.Medium { background: var(--gold-light); color: #a87c0f; }
  .kc-priority.Low { background: var(--rose-light); color: var(--rose); }
  .kanban-card .kc-actions { display: flex; align-items: center; gap: 8px; }
  .kc-status-select { flex: 1; padding: 6px 8px; font-size: 12px; border-radius: 8px; }
  @media (max-width: 720px) { .kanban-board { grid-template-columns: 1fr; } }

  /* UPLOAD BTN */
  .upload-btn {
    background: var(--plum-light); color: var(--plum-mid); border: 1px dashed var(--plum-mid);
    border-radius: 12px; padding: 10px 20px; cursor: pointer; font-size: 13.5px; font-weight: 700;
    font-family: 'Lato', sans-serif; transition: var(--transition);
  }
  .upload-btn:hover { background: var(--plum-light); color: var(--plum-mid); border-color: var(--rose); }

  /* EMPTY STATE */
  .empty { text-align: center; padding: 64px 24px; color: #c0a8d0; }
  .empty .empty-icon { font-size: 64px; margin-bottom: 14px; }
  .empty p { font-size: 16px; font-weight: 500; }

  /* EXPORT */
  .export-bar {
    display: flex; gap: 12px; margin-bottom: 24px; flex-wrap: wrap;
    padding: 16px 20px; background: var(--gold-light); border: 1px solid #e8d8a0;
    border-radius: 18px; align-items: center;
    box-shadow: 0 2px 10px rgba(201,168,76,0.05);
  }
  .export-bar span { font-size: 13.5px; color: #7a6030; flex: 1; font-weight: 500; }

  /* Sync Indicator Overlay styling */
  #sync-overlay {
    position: fixed; bottom: calc(20px + env(safe-area-inset-bottom)); left: calc(20px + env(safe-area-inset-left));
    background: var(--plum); color: var(--white);
    padding: 8px 16px; border-radius: 20px;
    font-size: 12.5px; display: flex; align-items: center; gap: 8px;
    box-shadow: 0 4px 15px rgba(0,0,0,0.15);
    z-index: 1000; transition: opacity 0.3s;
  }
  .sync-dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: #2a6e3a; animation: pulse 1.5s infinite;
  }
  @keyframes pulse { 0% { transform: scale(0.9); opacity: 0.6; } 50% { transform: scale(1.2); opacity: 1; } 100% { transform: scale(0.9); opacity: 0.6; } }

  @media (max-width: 600px) {
    .form-grid { grid-template-columns: 1fr; }
    .budget-stats { grid-template-columns: 1fr 1fr; }
    .home-hero h1 { font-size: 32px; }
    .page { padding: 18px 16px; }
    .nav-top { padding: 12px 16px; }
    .nav-tabs { padding: 0 16px; }
  }
</style>
</head>
<body>

<!-- AUTH / ONBOARDING SCREEN -->
<div id="authScreen">
  <div class="auth-card" id="authCard"><!-- rendered by JS --></div>
</div>

<!-- MAIN APP (hidden until signed in + household resolved) -->
<div id="appRoot" style="display:none">
  <div id="nav">
    <div class="nav-top">
      <div class="nav-brand" onclick="showPage('home')">💍 <span id="householdNameLabel">Wedding Planner</span></div>
      <button class="account-btn" id="accountBtn" onclick="toggleAccountPanel(true)" title="Account & Settings">⚙️</button>
    </div>
    <div class="nav-tabs" id="navTabs"></div>
  </div>

  <div id="pages">
    <!-- Pages injected by JS -->
  </div>

  <!-- Real-time Sync Toast Badge -->
  <div id="sync-overlay" style="opacity: 0;">
    <span class="sync-dot"></span>
    <span id="sync-text">Cloud Synced</span>
  </div>
</div>

<div class="account-scrim" id="accountScrim" onclick="toggleAccountPanel(false)"></div>
<div class="account-panel" id="accountPanel">
  <h3>⚙️ Account & Household</h3>
  <div id="accountPanelBody"><!-- rendered by JS --></div>
</div>

<!-- Load Google Firebase Client Compatibility SDKs -->
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>

<script>
// Initialize Firebase using the configuration supplied by the USER
const firebaseConfig = {
  apiKey: "AIzaSyDRV3_NEBjExb8oOHMPEjVIOASKzQk4wL0",
  authDomain: "wedding-planner-final.firebaseapp.com",
  projectId: "wedding-planner-final",
  storageBucket: "wedding-planner-final.firebasestorage.app",
  messagingSenderId: "301495022006",
  appId: "1:301495022006:web:28b6952914149b55d29117",
  measurementId: "G-3TR5WE7VVK"
};

// Start Firebase App, Auth and Firestore
firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();
const auth = firebase.auth();

const PAGES = [
  { id:'home',         label:'Home',          icon:'🏠' },
  { id:'timeline',     label:'Checklist',      icon:'✅' },
  { id:'venue',        label:'Venue',          icon:'🏛️' },
  { id:'event',        label:'Event Planner',  icon:'📋' },
  { id:'photography',  label:'Photography',    icon:'📷' },
  { id:'cinematography', label:'Cinematographer', icon:'🎥' },
  { id:'makeup',       label:'Makeup Artist',  icon:'💄' },
  { id:'budget',       label:'Budget',         icon:'💰' },
  { id:'guestlist',    label:'Guest List',     icon:'👥' },
  { id:'otherplans',   label:'Other Plans',    icon:'📝' },
  { id:'moodboard',    label:'Moodboard',      icon:'🎨' },
  { id:'bridecloth',   label:'Bride Outfits',  icon:'👗' },
  { id:'mencloth',     label:'Groom Outfits',  icon:'🤵' },
];

const CATEGORY_PAGES = PAGES.filter(p => !['home','budget','moodboard','guestlist','timeline'].includes(p.id));
const PAGE_COLORS = {
  venue:'#f0e8fa', event:'#fde8d8', photography:'#d8edf5',
  cinematography:'#d8f5f0',
  makeup:'#fde8f0', otherplans:'#f5f0d8', bridecloth:'#f5d8d8',
  mencloth:'#d8d8f5'
};

function uid() { return Math.random().toString(36).slice(2,9); }
function inviteCodeGen() {
  const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789'; // no ambiguous chars
  let out = '';
  for (let i=0;i<6;i++) out += chars[Math.floor(Math.random()*chars.length)];
  return out;
}

// ─── MULTI-TENANT STATE ───────────────────────────────────────────
let currentUser = null;      // Firebase auth user
let currentHouseholdId = null;
let householdUnsub = null;   // Firestore listener unsubscribe fn
let appState = {};

// Fallback to fetch data from standard LocalStorage, namespaced per household
function getDataFromLocalStorage(key) {
  const ns = 'wp_' + (currentHouseholdId || 'local') + '_' + key;
  try { return JSON.parse(localStorage.getItem(ns) || (key==='total_budget_limit' ? 'null' : '[]')); } catch { return key==='total_budget_limit' ? null : []; }
}
function setDataToLocalStorage(key, val) {
  const ns = 'wp_' + (currentHouseholdId || 'local') + '_' + key;
  try { localStorage.setItem(ns, JSON.stringify(val)); } catch {}
}

function getData(key) {
  return appState[key] || [];
}

// Setter writes to this household's private Firestore subcollection
function setData(key, val) {
  appState[key] = val;
  setDataToLocalStorage(key, val);
  if (!currentHouseholdId) return;

  showSyncIndicator("Saving to Cloud...");
  db.collection("households").doc(currentHouseholdId).collection("data").doc(key).set({ items: val })
    .then(() => showSyncIndicator("Cloud Synced", 1500))
    .catch(err => {
      console.error("Cloud save failed for " + key, err);
      showSyncIndicator("Offline Mode", 3000, "#c0392b");
    });
}

// Visual indicator overlay controller
function showSyncIndicator(text, duration = 0, color = "#2a6e3a") {
  const overlay = document.getElementById("sync-overlay");
  const dot = overlay.querySelector(".sync-dot");
  const textEl = document.getElementById("sync-text");
  if (!overlay) return;

  textEl.innerText = text;
  dot.style.background = color;
  overlay.style.opacity = "1";

  if (duration > 0) {
    setTimeout(() => {
      overlay.style.opacity = "0";
    }, duration);
  }
}

// Starts (or restarts) the realtime listener scoped to one household's data
function startHouseholdSync(householdId) {
  if (householdUnsub) { householdUnsub(); householdUnsub = null; }
  currentHouseholdId = householdId;
  appState = {};

  householdUnsub = db.collection("households").doc(householdId).collection("data")
    .onSnapshot((querySnapshot) => {
      querySnapshot.forEach((doc) => {
        if (doc.id === 'total_budget_limit') {
          appState.total_budget_limit = doc.data().value || 0;
        } else {
          appState[doc.id] = doc.data().items || [];
        }
      });

      let hasMissing = false;
      PAGES.forEach(p => {
        let key = p.id;
        if (key === 'budget') key = 'budget_items';
        if (!appState[key]) {
          appState[key] = getDataFromLocalStorage(key);
          hasMissing = true;
          db.collection("households").doc(householdId).collection("data").doc(key).set({ items: appState[key] });
        }
      });

      if (appState.total_budget_limit === undefined) {
        const localVal = getDataFromLocalStorage('total_budget_limit') || 1000000;
        appState.total_budget_limit = localVal;
        hasMissing = true;
        db.collection("households").doc(householdId).collection("data").doc("total_budget_limit").set({ value: localVal });
      }

      if (!hasMissing) showSyncIndicator("Synced Live", 1200);

      const activeTab = document.querySelector('.nav-tab.active');
      const activeId = activeTab ? activeTab.id.replace('tab_','') : 'home';
      renderPage(activeId);
    }, (error) => {
      console.error("Firestore Listener Failed, falling back to LocalStorage:", error);
      showSyncIndicator("Offline", 4000, "#c0392b");

      PAGES.forEach(p => {
        let key = p.id;
        if (key === 'budget') key = 'budget_items';
        appState[key] = getDataFromLocalStorage(key);
      });
      appState.total_budget_limit = getDataFromLocalStorage('total_budget_limit') || 1000000;

      const activeTab = document.querySelector('.nav-tab.active');
      const activeId = activeTab ? activeTab.id.replace('tab_','') : 'home';
      renderPage(activeId);
    });
}

// Build nav tabs
const tabsEl = document.getElementById('navTabs');
PAGES.forEach(p => {
  const t = document.createElement('button');
  t.className = 'nav-tab' + (p.id==='home'?' active':'');
  t.id = 'tab_'+p.id;
  t.innerHTML = p.icon + ' ' + p.label;
  t.onclick = () => showPage(p.id);
  tabsEl.appendChild(t);
});

// Build page containers
const pagesEl = document.getElementById('pages');
PAGES.forEach(p => {
  const div = document.createElement('div');
  div.className = 'page' + (p.id==='home'?' active':'');
  div.id = 'page_'+p.id;
  pagesEl.appendChild(div);
});

function showPage(id) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
  document.getElementById('page_'+id).classList.add('active');
  document.getElementById('tab_'+id).classList.add('active');
  renderPage(id);
  window.scrollTo(0,0);
}

// ─── CATEGORY PAGE ───────────────────────────────────────────────
function renderCategoryPage(pid) {
  const page = PAGES.find(p=>p.id===pid);
  const el = document.getElementById('page_'+pid);
  const entries = getData(pid);
  const color = PAGE_COLORS[pid]||'#f0e8fa';
  const totalSelected = entries.filter(e=>e.selected&&e.cost).reduce((s,e)=>s+Number(e.cost),0);

  el.innerHTML = `
    <div class="export-bar">
      <span>💡 Your data is fully synced to Firebase in real-time. Use Export to back up or share offline.</span>
      <button class="btn-secondary" onclick="exportData()">📤 Export All</button>
      <button class="btn-secondary" onclick="document.getElementById('importFile').click()">📥 Import</button>
      <input type="file" id="importFile" accept=".json" style="display:none" onchange="importData(event)">
    </div>
    <div class="page-header" style="background:linear-gradient(135deg,${color} 0%,#fff 100%);border:1px solid rgba(180,130,220,0.15)">
      <div>
        <h2>${page.icon} ${page.label}</h2>
        <div class="meta">${entries.length} entries · ${entries.filter(e=>e.selected).length} selected${totalSelected>0?' · ৳'+totalSelected.toLocaleString()+' committed':''}</div>
      </div>
      <div class="btn-group">
        ${entries.length>=2?`<button class="btn-secondary" onclick="toggleCompare('${pid}')">⚖️ Compare</button>`:''}
        <button class="btn-primary" onclick="showAddForm('${pid}')">+ Add Entry</button>
      </div>
    </div>
    <div id="compare_${pid}" style="display:none"></div>
    <div id="form_${pid}"></div>
    <div id="list_${pid}">
      ${entries.length===0
        ? `<div class="empty"><div class="empty-icon">${page.icon}</div><p>No entries yet. Click "+ Add Entry" to get started!</p></div>`
        : entries.map(e=>entryCardHTML(pid,e)).join('')
      }
    </div>
  `;
}

function entryCardHTML(pid, e) {
  return `
    <div class="entry-card" id="ecard_${e.id}">
      ${e.photo
        ? `<img class="entry-thumb" src="${e.photo}" alt="${e.name}">`
        : `<div class="entry-thumb-placeholder">${PAGES.find(p=>p.id===pid)?.icon||'📌'}</div>`
      }
      <div class="entry-body">
        <div class="entry-name">${e.name}</div>
        <div class="entry-badges">
          ${e.cost?`<span class="badge badge-cost">৳${Number(e.cost).toLocaleString()}</span>`:''}
          ${e.selected?`<span class="badge badge-selected">✓ Selected</span>`:''}
        </div>
        ${e.notes?`<div class="entry-notes">${e.notes}</div>`:''}
        ${e.link?`<a class="entry-link" href="${e.link}" target="_blank">🔗 ${e.link}</a>`:''}
      </div>
      <div class="entry-actions">
        <button class="btn-icon btn-edit" onclick="showEditForm('${pid}','${e.id}')">✏️</button>
        <button class="btn-icon btn-delete" onclick="deleteEntry('${pid}','${e.id}')">🗑️</button>
      </div>
    </div>`;
}

let compareVisible = {};
function toggleCompare(pid) {
  compareVisible[pid] = !compareVisible[pid];
  const el = document.getElementById('compare_'+pid);
  if (compareVisible[pid]) {
    el.style.display = 'block';
    el.innerHTML = buildCompareHTML(pid);
  } else {
    el.style.display = 'none';
  }
}

function buildCompareHTML(pid) {
  const entries = getData(pid).filter(e=>e.cost);
  if (entries.length < 2) return `<div class="compare-box"><p style="color:var(--gray);padding:12px">Add at least 2 entries with costs to compare.</p></div>`;
  const sorted = [...entries].sort((a,b)=>Number(a.cost)-Number(b.cost));
  const cheapId = sorted[0].id;
  const rows = sorted.map(e=>`
    <tr class="${e.selected?'selected-row':''}">
      <td><div style="display:flex;align-items:center;gap:8px">
        ${e.photo?`<img src="${e.photo}" style="width:32px;height:32px;border-radius:6px;object-fit:cover">`:''}
        <span style="font-weight:${e.selected?700:400}">${e.name}</span>
      </div></td>
      <td><span style="font-weight:700;color:${e.id===cheapId?'#2a6e3a':'var(--plum)'}">
        ৳${Number(e.cost).toLocaleString()}
        ${e.id===cheapId?'<span style="margin-left:4px;font-size:11px;background:#d8f5e8;color:#2a6e3a;padding:1px 6px;border-radius:10px">Lowest</span>':''}
      </span></td>
      <td style="color:var(--gray);max-width:160px">${e.notes||'—'}</td>
      <td>${e.link?`<a href="${e.link}" target="_blank" style="color:var(--plum-mid)">Visit</a>`:'—'}</td>
      <td>${e.selected?'<span class="badge badge-selected">Selected</span>':'—'}</td>
    </tr>`).join('');
  const committed = entries.filter(e=>e.selected).reduce((s,e)=>s+Number(e.cost),0);
  return `
    <div class="compare-box">
      <div class="compare-header">
        <h3>⚖️ Comparison</h3>
        <button class="btn-cancel" onclick="toggleCompare('${pid}')">Close</button>
      </div>
      <div style="overflow-x:auto">
        <table>
          <thead><tr><th>Name</th><th>Cost (৳)</th><th>Notes</th><th>Link</th><th>Status</th></tr></thead>
          <tbody>${rows}</tbody>
        </table>
      </div>
      <div class="compare-summary">
        <strong>Total committed:</strong> ৳${committed.toLocaleString()}
        <span style="margin-left:12px;color:var(--gray)">(${entries.filter(e=>e.selected).length} selected)</span>
      </div>
    </div>`;
}

function showAddForm(pid) {
  const el = document.getElementById('form_'+pid);
  el.innerHTML = formHTML(pid, null);
}
function showEditForm(pid, eid) {
  const entry = getData(pid).find(e=>e.id===eid);
  if (!entry) return;
  const el = document.getElementById('form_'+pid);
  el.innerHTML = formHTML(pid, entry);
}
function hideForm(pid) { document.getElementById('form_'+pid).innerHTML=''; }

function formHTML(pid, entry) {
  const e = entry || {};
  return `
    <div class="form-box">
      <div class="form-grid">
        <div>
          <label>Name / Title *</label>
          <input type="text" id="f_name" value="${e.name||''}" placeholder="e.g. Royal Garden Hall">
        </div>
        <div>
          <label>Cost (৳)</label>
          <input type="number" id="f_cost" value="${e.cost||''}" placeholder="e.g. 150000">
        </div>
        <div class="form-full">
          <label>Notes / Description</label>
          <textarea id="f_notes" rows="2" placeholder="Add details...">${e.notes||''}</textarea>
        </div>
        <div>
          <label>Website / Link</label>
          <input type="url" id="f_link" value="${e.link||''}" placeholder="https://...">
        </div>
        <div>
          <label>Photo</label>
          <div style="display:flex;align-items:center;gap:10px">
            <button class="upload-btn" onclick="document.getElementById('f_photo_input').click()">
              📷 ${e.photo?'Change Photo':'Upload Photo'}
            </button>
            <input type="file" id="f_photo_input" accept="image/*" style="display:none" onchange="previewPhoto(event)">
            <img id="f_photo_preview" src="${e.photo||''}" style="width:44px;height:44px;border-radius:10px;object-fit:cover;display:${e.photo?'block':'none'}">
          </div>
          <input type="hidden" id="f_photo" value="${e.photo||''}">
        </div>
      </div>
      <div class="checkbox-row">
        <input type="checkbox" id="f_selected" ${e.selected?'checked':''}>
        <label for="f_selected">Mark as Selected / Chosen</label>
      </div>
      <div class="btn-group">
        <button class="btn-primary" onclick="saveEntry('${pid}','${e.id||''}')">💾 Save Entry</button>
        <button class="btn-cancel" onclick="hideForm('${pid}')">Cancel</button>
      </div>
    </div>`;
}

function previewPhoto(event) {
  const file = event.target.files[0];
  if (!file) return;
  
  // Basic file compression before saving to keep Firestore document size light
  const reader = new FileReader();
  reader.onload = ev => {
    const img = new Image();
    img.src = ev.target.result;
    img.onload = () => {
      const canvas = document.createElement("canvas");
      const ctx = canvas.getContext("2d");
      const maxW = 320; 
      const scale = maxW / img.width;
      canvas.width = maxW;
      canvas.height = img.height * scale;
      
      ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
      const base64 = canvas.toDataURL("image/jpeg", 0.7); // compress quality to 70%
      
      document.getElementById('f_photo').value = base64;
      const preview = document.getElementById('f_photo_preview');
      preview.src = base64;
      preview.style.display = 'block';
    };
  };
  reader.readAsDataURL(file);
}

function saveEntry(pid, eid) {
  const name = document.getElementById('f_name').value.trim();
  if (!name) { alert('Please enter a name.'); return; }
  const entry = {
    id: eid || uid(),
    name,
    cost: document.getElementById('f_cost').value,
    notes: document.getElementById('f_notes').value,
    link: document.getElementById('f_link').value,
    photo: document.getElementById('f_photo').value,
    selected: document.getElementById('f_selected').checked,
  };
  const entries = getData(pid);
  if (eid) {
    const idx = entries.findIndex(e=>e.id===eid);
    if (idx>=0) entries[idx]=entry; else entries.push(entry);
  } else {
    entries.push(entry);
  }
  setData(pid, entries);
}

function deleteEntry(pid, eid) {
  if (!confirm('Delete this entry?')) return;
  setData(pid, getData(pid).filter(e=>e.id!==eid));
}

// Helper to count spent values from planning categories automatically
function getCategorySpent(categoryName, manualSpent) {
  const normalized = categoryName.toLowerCase().trim();
  let pageId = null;
  if (normalized === 'venue') pageId = 'venue';
  else if (normalized === 'event' || normalized === 'event planner' || normalized === 'eventplanner') pageId = 'event';
  else if (normalized === 'photography' || normalized === 'photographer' || normalized === 'photo') pageId = 'photography';
  else if (normalized === 'cinematography' || normalized === 'cinematographer' || normalized === 'video' || normalized === 'videography') pageId = 'cinematography';
  else if (normalized === 'makeup' || normalized === 'makeup artist' || normalized === 'makeupartist') pageId = 'makeup';
  else if (normalized === 'other plans' || normalized === 'otherplans' || normalized === 'other plan' || normalized === 'otherplan') pageId = 'otherplans';
  else if (normalized === 'bride outfits' || normalized === 'bridecloth' || normalized === 'bride outfits' || normalized === 'bride outfit') pageId = 'bridecloth';
  else if (normalized === 'groom outfits' || normalized === 'mencloth' || normalized === 'groom outfit') pageId = 'mencloth';

  if (pageId) {
    const entries = getData(pageId);
    return entries.filter(e => e.selected && e.cost).reduce((s, e) => s + Number(e.cost), 0);
  }
  return Number(manualSpent) || 0;
}

function addMoodImages(event) {
  const files = Array.from(event.target.files);
  const items = getData('moodboard');
  let loaded = 0;
  
  files.forEach(file => {
    const reader = new FileReader();
    reader.onload = ev => {
      // Compress moodboard photo before upload
      const img = new Image();
      img.src = ev.target.result;
      img.onload = () => {
        const canvas = document.createElement("canvas");
        const ctx = canvas.getContext("2d");
        const maxW = 400; 
        const scale = maxW / img.width;
        canvas.width = maxW;
        canvas.height = img.height * scale;
        
        ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
        const base64 = canvas.toDataURL("image/jpeg", 0.65); // compress quality
        
        items.push({ id:uid(), photo:base64, label:file.name.replace(/\.[^/.]+$/,'') });
        loaded++;
        if (loaded === files.length) {
          setData('moodboard', items);
        }
      };
    };
    reader.readAsDataURL(file);
  });
}

  const items = getData('moodboard').map(i=>i.id===id?{...i,label:val}:i);

function exportData() {

  CATEGORY_PAGES.forEach(p => all[p.id] = getData(p.id));
  all.budget_items = getData('budget_items');
  all.moodboard = getData('moodboard');
  all.guestlist = getData('guestlist');
  all.timeline = getData('timeline');
  const blob = new Blob([JSON.stringify(all,null,2)],{type:'application/json'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'wedding-planner-backup.json';
  a.click();
}
function importData(event) {
  const file = event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    try {
      const data = JSON.parse(ev.target.result);
      if (confirm('This will replace ALL current data. Continue?')) {
        Object.keys(data).forEach(key => setData(key, data[key]));
        alert('Data imported successfully!');
        renderPage(document.querySelector('.nav-tab.active').id.replace('tab_',''));
      }
    } catch { alert('Invalid backup file.'); }
  };
  reader.readAsText(file);
}

// ─── CHECKLIST PAGE (function-wise Kanban board) ──────────────────
const WEDDING_FUNCTIONS = ['Mehendi','Haldi','Nikah','Reception','Engagement','General'];
const STATUS_COLS = [
  { id:'Not Started', dot:'#c9a84c' },
  { id:'In Progress', dot:'#7a4fa8' },
  { id:'Done', dot:'#2f7a5c' },
];
let activeFunctionFilter = 'All';

// Normalize a stored task to the new shape (handles old data: done/category -> status/function)
function normalizeTask(t) {
  const status = t.status || (t.done ? 'Done' : 'Not Started');
  const func = t.function || t.category || 'General';
  return { ...t, status, function: func, priority: t.priority || 'Medium' };
}

function renderTimelinePage() {
  const el = document.getElementById('page_timeline');
  const tasks = getData('timeline').map(normalizeTask);
  const today = new Date().toISOString().slice(0,10);
  const doneCount = tasks.filter(t=>t.status==='Done').length;
  const pct = tasks.length ? Math.round((doneCount/tasks.length)*100) : 0;

  // Build function pill list: presets first, then any custom functions found in data
  const usedFuncs = [...new Set(tasks.map(t=>t.function))];
  const allFuncs = [...WEDDING_FUNCTIONS, ...usedFuncs.filter(f=>!WEDDING_FUNCTIONS.includes(f))];
  if (!allFuncs.includes(activeFunctionFilter) && activeFunctionFilter !== 'All') activeFunctionFilter = 'All';

  const pills = ['All', ...allFuncs].map(f => {
    const count = f==='All' ? tasks.length : tasks.filter(t=>t.function===f).length;
    return `<button class="function-pill ${activeFunctionFilter===f?'active':''}" onclick="setFunctionFilter('${f}')">${f} <span class="cnt">${count}</span></button>`;
  }).join('');

  const visible = activeFunctionFilter==='All' ? tasks : tasks.filter(t=>t.function===activeFunctionFilter);

  const cols = STATUS_COLS.map(col => {
    const colTasks = visible.filter(t=>t.status===col.id)
      .sort((a,b)=>(a.dueDate||'9999').localeCompare(b.dueDate||'9999'));
    const cards = colTasks.map(t => {
      const overdue = t.status!=='Done' && t.dueDate && t.dueDate < today;
      return `
      <div class="kanban-card">
        <div class="kc-title">${t.task}</div>
        <div class="kc-meta">
          ${activeFunctionFilter==='All' ? `<span class="kc-func-badge">${t.function}</span>` : ''}
          <span class="kc-priority ${t.priority}">${t.priority}</span>
          ${t.dueDate?`<span class="kc-due ${overdue?'overdue-text':''}">📅 ${t.dueDate}${overdue?' overdue':''}</span>`:''}
        </div>
        ${t.notes?`<div class="entry-notes" style="margin-bottom:8px">${t.notes}</div>`:''}
        <div class="kc-actions">
          <select class="kc-status-select" onchange="updateTaskField('${t.id}','status',this.value)">
            ${STATUS_COLS.map(c=>`<option value="${c.id}" ${t.status===c.id?'selected':''}>${c.id}</option>`).join('')}
          </select>
          <button class="btn-icon btn-edit" onclick="showEditTaskForm('${t.id}')">✏️</button>
          <button class="btn-icon btn-delete" onclick="deleteTask('${t.id}')">🗑️</button>
        </div>
      </div>`;
    }).join('');
    return `
      <div class="kanban-col">
        <div class="kanban-col-head"><span class="kanban-col-dot" style="background:${col.dot}"></span>${col.id}<span class="kanban-col-count">${colTasks.length}</span></div>
        ${cards || '<div style="font-size:12.5px;color:var(--gray);text-align:center;padding:14px 0">No tasks</div>'}
      </div>`;
  }).join('');

  el.innerHTML = `
    <div class="export-bar">
      <span>💡 Your data is fully synced to Firebase in real-time.</span>
      <button class="btn-secondary" onclick="exportData()">📤 Export All</button>
      <button class="btn-secondary" onclick="document.getElementById('importFile5').click()">📥 Import</button>
      <input type="file" id="importFile5" accept=".json" style="display:none" onchange="importData(event)">
    </div>
    <div class="page-header" style="background:linear-gradient(135deg,#fdf0d8 0%,#fff 100%);border:1px solid rgba(200,160,80,0.2)">
      <div><h2>✅ Wedding Checklist</h2><div class="meta">${doneCount} of ${tasks.length} tasks done, organized by function</div></div>
      <button class="btn-primary" onclick="showAddTaskForm()">+ Add Task</button>
    </div>
    ${tasks.length>0?`
    <div class="progress-wrap">
      <div class="progress-labels"><span>Overall progress</span><span>${pct}%</span></div>
      <div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>
    </div>`:''}
    <div class="function-pills">${pills}</div>
    <div id="task_form"></div>
    ${tasks.length===0
      ? '<div class="empty"><div class="empty-icon">✅</div><p>No tasks yet. Add your first wedding to-do, grouped by function like Mehendi, Haldi, Nikah, Reception...</p></div>'
      : `<div class="kanban-board">${cols}</div>`
    }`;
}

function setFunctionFilter(f) {
  activeFunctionFilter = f;
  renderTimelinePage();
}

function updateTaskField(id, field, value) {
  const tasks = getData('timeline').map(normalizeTask).map(t => t.id===id ? {...t, [field]: value} : t);
  setData('timeline', tasks);
}

function showAddTaskForm() {
  document.getElementById('task_form').innerHTML = taskFormHTML(null);
}
function showEditTaskForm(id) {
  const task = getData('timeline').map(normalizeTask).find(t=>t.id===id);
  if (!task) return;
  document.getElementById('task_form').innerHTML = taskFormHTML(task);
}
function taskFormHTML(t) {
  t = t || {};
  const presetFunc = WEDDING_FUNCTIONS.includes(t.function) || !t.function;
  return `
    <div class="form-box">
      <div class="form-grid">
        <div class="form-full"><label>Task *</label><input type="text" id="t_task" value="${t.task||''}" placeholder="e.g. Book the mehendi artist"></div>
        <div><label>Function / Event</label>
          <select id="t_func">
            ${WEDDING_FUNCTIONS.map(f=>`<option value="${f}" ${t.function===f?'selected':''}>${f}</option>`).join('')}
            <option value="__custom__" ${!presetFunc?'selected':''}>Custom...</option>
          </select>
          <input type="text" id="t_func_custom" value="${!presetFunc?t.function:''}" placeholder="Custom function name" style="margin-top:8px;${presetFunc?'display:none':''}">
        </div>
        <div><label>Priority</label>
          <select id="t_priority">
            <option value="Low" ${t.priority==='Low'?'selected':''}>Low</option>
            <option value="Medium" ${(!t.priority||t.priority==='Medium')?'selected':''}>Medium</option>
            <option value="High" ${t.priority==='High'?'selected':''}>High</option>
          </select>
        </div>
        <div><label>Due Date</label><input type="date" id="t_due" value="${t.dueDate||''}"></div>
        <div><label>Status</label>
          <select id="t_status">
            ${STATUS_COLS.map(c=>`<option value="${c.id}" ${t.status===c.id?'selected':''}>${c.id}</option>`).join('')}
          </select>
        </div>
        <div class="form-full"><label>Notes</label><input type="text" id="t_notes" value="${t.notes||''}" placeholder="Any note..."></div>
      </div>
      <div class="btn-group">
        <button class="btn-primary" onclick="saveTask('${t.id||''}')">💾 Save Task</button>
        <button class="btn-cancel" onclick="document.getElementById('task_form').innerHTML=''">Cancel</button>
      </div>
    </div>`;
}
document.addEventListener('change', (e) => {
  if (e.target && e.target.id === 't_func') {
    document.getElementById('t_func_custom').style.display = e.target.value==='__custom__' ? 'block' : 'none';
  }
});
function saveTask(tid) {
  const task = document.getElementById('t_task').value.trim();
  if (!task) { alert('Please enter a task.'); return; }
  const funcSel = document.getElementById('t_func').value;
  const func = funcSel==='__custom__' ? (document.getElementById('t_func_custom').value.trim() || 'General') : funcSel;
  const entry = {
    id: tid || uid(),
    task,
    function: func,
    priority: document.getElementById('t_priority').value,
    dueDate: document.getElementById('t_due').value,
    status: document.getElementById('t_status').value,
    notes: document.getElementById('t_notes').value,
  };
  const tasks = getData('timeline').map(normalizeTask);
  if (tid) {
    const idx = tasks.findIndex(t=>t.id===tid);
    if (idx>=0) tasks[idx]=entry; else tasks.push(entry);
  } else {
    tasks.push(entry);
  }
  setData('timeline', tasks);
  document.getElementById('task_form').innerHTML = '';
}
function deleteTask(id) {
  if (!confirm('Delete this task?')) return;
  setData('timeline', getData('timeline').filter(t=>t.id!==id));
}

// ─── AUTH & HOUSEHOLD (MULTI-TENANT) ──────────────────────────────
let authMode = 'login'; // 'login' | 'signup'

function renderAuthCard() {
  const card = document.getElementById('authCard');
  card.innerHTML = `
    <div class="logo">💍</div>
    <h1>Our Wedding Planner</h1>
    <div class="sub">A private space to plan every beautiful detail together</div>
    <div class="auth-tabs">
      <button class="auth-tab ${authMode==='login'?'active':''}" onclick="setAuthMode('login')">Log In</button>
      <button class="auth-tab ${authMode==='signup'?'active':''}" onclick="setAuthMode('signup')">Sign Up</button>
    </div>
    <div class="auth-error" id="authError"></div>
    <div class="field"><label>Email</label><input type="text" id="auth_email" placeholder="you@example.com"></div>
    <div class="field"><label>Password</label><input type="text" id="auth_password" placeholder="At least 6 characters"></div>
    ${authMode==='signup' ? `<div class="field"><label>Your Name</label><input type="text" id="auth_name" placeholder="e.g. Ayesha"></div>` : ''}
    <button class="btn-primary btn-block" onclick="${authMode==='login'?'doEmailLogin()':'doEmailSignup()'}">${authMode==='login'?'Log In':'Create Account'}</button>
    <div class="auth-divider">or</div>
    <button class="btn-google" onclick="doGoogleLogin()">
      <svg width="18" height="18" viewBox="0 0 18 18"><path fill="#4285F4" d="M17.64 9.2c0-.64-.06-1.25-.16-1.84H9v3.48h4.84c-.21 1.13-.85 2.09-1.8 2.73v2.27h2.92c1.7-1.57 2.68-3.88 2.68-6.64z"/><path fill="#34A853" d="M9 18c2.43 0 4.47-.8 5.96-2.18l-2.92-2.27c-.81.54-1.85.86-3.04.86-2.34 0-4.32-1.58-5.03-3.71H.96v2.34C2.44 15.98 5.48 18 9 18z"/><path fill="#FBBC05" d="M3.97 10.7c-.18-.54-.28-1.11-.28-1.7s.1-1.16.28-1.7V4.96H.96A8.996 8.996 0 000 9c0 1.45.35 2.83.96 4.04l3.01-2.34z"/><path fill="#EA4335" d="M9 3.58c1.32 0 2.51.45 3.44 1.35l2.59-2.59C13.46.89 11.43 0 9 0 5.48 0 2.44 2.02.96 4.96l3.01 2.34C4.68 5.16 6.66 3.58 9 3.58z"/></svg>
      Continue with Google
    </button>
  `;
}
function setAuthMode(mode) { authMode = mode; renderAuthCard(); }
function showAuthError(msg) {
  const el = document.getElementById('authError');
  el.textContent = msg;
  el.style.display = 'block';
}

function doEmailSignup() {
  const email = document.getElementById('auth_email').value.trim();
  const pw = document.getElementById('auth_password').value;
  const name = document.getElementById('auth_name') ? document.getElementById('auth_name').value.trim() : '';
  if (!email || pw.length < 6) { showAuthError('Enter a valid email and a password with 6+ characters.'); return; }
  auth.createUserWithEmailAndPassword(email, pw)
    .then(cred => name ? cred.user.updateProfile({ displayName: name }) : null)
    .catch(err => showAuthError(err.message));
}
function doEmailLogin() {
  const email = document.getElementById('auth_email').value.trim();
  const pw = document.getElementById('auth_password').value;
  if (!email || !pw) { showAuthError('Enter your email and password.'); return; }
  auth.signInWithEmailAndPassword(email, pw).catch(err => showAuthError(err.message));
}
function doGoogleLogin() {
  const provider = new firebase.auth.GoogleAuthProvider();
  const isMobile = /iphone|ipad|ipod|android/i.test(navigator.userAgent);

  if (isMobile) {
    // Popups + sessionStorage are unreliable on mobile Safari / in-app browsers.
    // Redirect flow is far more robust there.
    auth.signInWithRedirect(provider).catch(err => showAuthError(err.message));
  } else {
    auth.signInWithPopup(provider).catch(err => {
      // If popup fails for any storage/browser reason, fall back to redirect.
      if (err.code === 'auth/popup-blocked' || err.code === 'auth/web-storage-unsupported' ||
          err.code === 'auth/operation-not-supported-in-this-environment' || err.message.includes('initial state')) {
        auth.signInWithRedirect(provider).catch(e2 => showAuthError(e2.message));
      } else {
        showAuthError(err.message);
      }
    });
  }
}
function signOutUser() {
  if (householdUnsub) { householdUnsub(); householdUnsub = null; }
  currentHouseholdId = null;
  auth.signOut();
}

// Onboarding: choose to create a new household or join partner's with invite code
function renderOnboarding() {
  const card = document.getElementById('authCard');
  card.innerHTML = `
    <div class="logo">💍</div>
    <h1>Welcome!</h1>
    <div class="sub">Let's set up your wedding workspace</div>
    <div class="onboard-choice">
      <div class="onboard-option" onclick="showCreateHousehold()">
        <div class="oi">✨</div>
        <div class="ot">Start a new wedding planner</div>
        <div class="od">You'll get an invite code to share with your partner.</div>
      </div>
      <div class="onboard-option" onclick="showJoinHousehold()">
        <div class="oi">🔗</div>
        <div class="ot">Join my partner's planner</div>
        <div class="od">Enter the invite code they shared with you.</div>
      </div>
    </div>
    <div style="margin-top:18px"><button class="btn-cancel btn-block" onclick="signOutUser()">Sign out</button></div>
  `;
}
function showCreateHousehold() {
  const card = document.getElementById('authCard');
  card.innerHTML = `
    <div class="logo">✨</div>
    <h1>Name Your Wedding</h1>
    <div class="sub">e.g. "Ayesha & Rafi's Wedding"</div>
    <div class="auth-error" id="authError"></div>
    <div class="field"><label>Planner Name</label><input type="text" id="hh_name" placeholder="Our Wedding"></div>
    <button class="btn-primary btn-block" onclick="createHousehold()">Create Planner</button>
    <div style="margin-top:12px"><button class="btn-cancel btn-block" onclick="renderOnboarding()">Back</button></div>
  `;
}
function showJoinHousehold() {
  const card = document.getElementById('authCard');
  card.innerHTML = `
    <div class="logo">🔗</div>
    <h1>Enter Invite Code</h1>
    <div class="sub">Ask your partner for their 6-character code</div>
    <div class="auth-error" id="authError"></div>
    <div class="field"><label>Invite Code</label><input type="text" id="hh_code" placeholder="e.g. AB12CD" style="text-transform:uppercase;letter-spacing:2px"></div>
    <button class="btn-primary btn-block" onclick="joinHousehold()">Join Planner</button>
    <div style="margin-top:12px"><button class="btn-cancel btn-block" onclick="renderOnboarding()">Back</button></div>
  `;
}
function createHousehold() {
  const name = document.getElementById('hh_name').value.trim() || 'Our Wedding';
  const code = inviteCodeGen();
  const hhRef = db.collection('households').doc();
  hhRef.set({
    name, inviteCode: code, createdBy: currentUser.uid,
    members: [currentUser.uid], createdAt: firebase.firestore.FieldValue.serverTimestamp()
  }).then(() => {
    return db.collection('users').doc(currentUser.uid).set({
      householdId: hhRef.id, email: currentUser.email || '', displayName: currentUser.displayName || ''
    });
  }).then(() => enterHousehold(hhRef.id, name))
    .catch(err => showAuthError(err.message));
}
function joinHousehold() {
  const code = document.getElementById('hh_code').value.trim().toUpperCase();
  if (!code) { showAuthError('Enter the invite code.'); return; }
  db.collection('households').where('inviteCode', '==', code).limit(1).get()
    .then(snap => {
      if (snap.empty) { showAuthError('No planner found with that code.'); return; }
      const doc = snap.docs[0];
      return doc.ref.update({ members: firebase.firestore.FieldValue.arrayUnion(currentUser.uid) })
        .then(() => db.collection('users').doc(currentUser.uid).set({
          householdId: doc.id, email: currentUser.email || '', displayName: currentUser.displayName || ''
        }))
        .then(() => enterHousehold(doc.id, doc.data().name));
    })
    .catch(err => showAuthError(err.message));
}

function enterHousehold(householdId, name) {
  document.getElementById('householdNameLabel').textContent = name || 'Wedding Planner';
  document.getElementById('authScreen').style.display = 'none';
  document.getElementById('appRoot').style.display = 'block';
  startHouseholdSync(householdId);
  renderAccountPanel();
}

// ─── ACCOUNT PANEL ─────────────────────────────────────────────────
function toggleAccountPanel(open) {
  document.getElementById('accountPanel').classList.toggle('open', open);
  document.getElementById('accountScrim').classList.toggle('open', open);
  if (open) renderAccountPanel();
}
function renderAccountPanel() {
  if (!currentHouseholdId) return;
  db.collection('households').doc(currentHouseholdId).get().then(doc => {
    const data = doc.data() || {};
    const body = document.getElementById('accountPanelBody');
    body.innerHTML = `
      <div class="account-row"><div class="lbl">Signed in as</div>${currentUser.displayName || currentUser.email || 'You'}</div>
      <div class="account-row"><div class="lbl">Planner Name</div>${data.name || 'Our Wedding'}</div>
      <div class="account-row">
        <div class="lbl">Invite Code — share with your partner</div>
        <div class="invite-box">
          <div class="invite-code">${data.inviteCode || '——'}</div>
          <button class="btn-secondary" onclick="copyInviteCode('${data.inviteCode || ''}')">📋 Copy Code</button>
        </div>
      </div>
      <div class="account-row"><div class="lbl">Members</div>${(data.members||[]).length} joined</div>
      <div style="margin-top:20px"><button class="btn-cancel btn-block" onclick="signOutUser()">🚪 Sign Out</button></div>
    `;
  });
}
function copyInviteCode(code) {
  if (!code) return;
  navigator.clipboard.writeText(code).then(() => showSyncIndicator('Invite code copied!', 1500, '#2a6e3a'));
}

// ─── AUTH STATE LISTENER (entry point) ────────────────────────────
renderAuthCard();

// Surface any error from a completed signInWithRedirect flow (e.g. account-exists-with-different-credential)
auth.getRedirectResult().catch(err => {
  if (err && err.code) showAuthError(err.message);
});

auth.onAuthStateChanged(user => {
  currentUser = user;
  if (householdUnsub) { householdUnsub(); householdUnsub = null; }
  document.getElementById('appRoot').style.display = 'none';

  if (!user) {
    document.getElementById('authScreen').style.display = 'flex';
    authMode = 'login';
    renderAuthCard();
    return;
  }

  document.getElementById('authScreen').style.display = 'flex';
  db.collection('users').doc(user.uid).get().then(doc => {
    if (doc.exists && doc.data().householdId) {
      db.collection('households').doc(doc.data().householdId).get().then(hh => {
        enterHousehold(doc.data().householdId, hh.exists ? hh.data().name : 'Our Wedding');
      });
    } else {
      renderOnboarding();
    }
  }).catch(err => {
    console.error('Failed to resolve user profile:', err);
    renderOnboarding();
  });
});

// Register service worker for installability / offline app shell
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('sw.js').catch(err => console.error('SW registration failed:', err));
  });
}
</script>
